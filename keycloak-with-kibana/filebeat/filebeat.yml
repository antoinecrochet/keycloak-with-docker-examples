filebeat.inputs:
  - type: filestream
    id: keycloak-logs
    enabled: true
    paths:
      - /keycloak-logs/*.log
    # parsers:
    #   multiline:
    #     type: pattern
    #     pattern: '^\['             # assumes Keycloak log lines start with "[2025-...]", etc.
    #     negate: true
    #     match: after

output.logstash:
  hosts: ["logstash:5044"]

xpack.monitoring:
  enabled: true
  elasticsearch:
    hosts: ["http://elasticsearch:9200"]